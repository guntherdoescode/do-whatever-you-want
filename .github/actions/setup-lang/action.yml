name: "Setup Language Environment"
description: "Installs required tooling for a given language"
inputs:
  language:
    description: "The language to set up"
    required: true
runs:
  using: "composite"
  steps:
    - name: Setup Rust
      if: inputs.language == 'rust'
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    - name: Setup Go
      if: inputs.language == 'go'
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
    - name: Setup Node
      if: inputs.language == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Setup Python
      if: inputs.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Setup Java
      if: inputs.language == 'java' || inputs.language == 'kotlin' || inputs.language == 'scala'
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Setup C/C++
      if: inputs.language == 'c_cpp'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq gcc g++ make cmake 2>/dev/null
    - name: Setup C# (.NET)
      if: inputs.language == 'csharp'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'
    - name: Setup Ruby
      if: inputs.language == 'ruby'
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
    - name: Setup PHP
      if: inputs.language == 'php'
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
    - name: Setup Zig
      if: inputs.language == 'zig'
      uses: mlugg/setup-zig@v1
      with:
        version: '0.14.0'
    - name: Setup Kotlin
      if: inputs.language == 'kotlin'
      shell: bash
      run: |
        curl -sSLO https://github.com/JetBrains/kotlin/releases/download/v2.1.0/kotlin-compiler-2.1.0.zip
        sudo unzip -q kotlin-compiler-*.zip -d /opt
        sudo ln -sf /opt/kotlinc/bin/kotlinc /usr/local/bin/kotlinc
        sudo ln -sf /opt/kotlinc/bin/kotlin /usr/local/bin/kotlin
        rm -f kotlin-compiler-*.zip
    - name: Setup Swift
      if: inputs.language == 'swift'
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: '6.0'
    - name: Setup Haskell
      if: inputs.language == 'haskell'
      uses: haskell/actions/setup@v2
      with:
        ghc-version: '9.10'
        cabal-version: '3.12'
    - name: Setup Dart
      if: inputs.language == 'dart'
      uses: dart-lang/setup-dart@v1
      with:
        sdk: '3.6'
    - name: Setup Scala
      if: inputs.language == 'scala'
      shell: bash
      run: |
        curl -sSfL https://github.com/lampepfl/dotty/releases/download/3.6.2/scala3-3.6.2.tar.gz | sudo tar xz -C /opt
        sudo ln -sf /opt/scala3-3.6.2/bin/scalac /usr/local/bin/scalac
        sudo ln -sf /opt/scala3-3.6.2/bin/scala /usr/local/bin/scala
    - name: Setup Assembly
      if: inputs.language == 'assembly'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq nasm 2>/dev/null
    - name: Setup Brainfuck
      if: inputs.language == 'brainfuck'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq bf 2>/dev/null
    - name: Setup Clojure
      if: inputs.language == 'clojure'
      shell: bash
      run: |
        curl -fsSL https://clojure.org/install/linux-install-1.12.2.1470.sh | bash
    - name: Setup Crystal
      if: inputs.language == 'crystal'
      shell: bash
      run: |
        curl -fsSL https://crystal-lang.org/install.sh | bash
    - name: Setup Elixir
      if: inputs.language == 'elixir'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq erlang elixir 2>/dev/null
    - name: Setup Erlang
      if: inputs.language == 'erlang'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq erlang-base 2>/dev/null
    - name: Setup Julia
      if: inputs.language == 'julia'
      shell: bash
      run: |
        curl -fsSL https://julialang-s3.julialang.org/bin/linux/x64/1.11/julia-1.11.4-linux-x86_64.tar.gz | sudo tar xz -C /opt
        sudo ln -sf /opt/julia-1.11.4/bin/julia /usr/local/bin/julia
    - name: Setup Lua
      if: inputs.language == 'lua'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq lua5.4 2>/dev/null
    - name: Setup Nim
      if: inputs.language == 'nim'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq nim 2>/dev/null
    - name: Setup OCaml
      if: inputs.language == 'ocaml'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq ocaml ocaml-findlib 2>/dev/null
    - name: Setup Perl
      if: inputs.language == 'perl'
      shell: bash
      run: |
        perl -v >/dev/null 2>&1 || sudo apt-get install -y -qq perl 2>/dev/null
    - name: Setup R
      if: inputs.language == 'r'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq r-base 2>/dev/null
    - name: Setup V
      if: inputs.language == 'v'
      shell: bash
      run: |
        git clone --depth=1 https://github.com/vlang/v /tmp/vlang
        cd /tmp/vlang && make
        sudo ln -sf /tmp/vlang/v /usr/local/bin/v
