name: "Setup Language Environment"
description: "Installs required tooling for a given language"
inputs:
  language:
    description: "The language to set up (rust, go, node, python, java)"
    required: true
runs:
  using: "composite"
  steps:
    - name: Setup Rust
      if: inputs.language == 'rust'
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    - name: Setup Go
      if: inputs.language == 'go'
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
    - name: Setup Node
      if: inputs.language == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Setup Python
      if: inputs.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Setup Java
      if: inputs.language == 'java'
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
